<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Tracker (Manual Sync)</title>
    <style>
        /* CSS: Dark Mode Styling */
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            position: relative;
        }

        h1 { text-align: center; color: #ffffff; margin-bottom: 5px; }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }
        .settings-btn:hover { color: #fff; }

        /* CLOUD CONTROLS (New) */
        .cloud-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #252525;
            border-radius: 8px;
            border: 1px solid #333;
            align-items: center;
        }
        
        .sync-btn {
            padding: 6px 12px;
            border: 1px solid #555;
            background-color: #333;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sync-btn:hover { background-color: #444; color: white; }
        
        #syncStatus {
            font-size: 0.85rem;
            color: #888;
            margin-left: 10px;
        }

        /* Input Section */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: white;
            border-radius: 4px;
        }

        .add-btn {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .add-btn:hover { background-color: #218838; }

        /* Filters */
        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            color: #aaa;
            transition: all 0.2s;
        }
        .filter-btn:hover { background-color: #383838; }
        .filter-btn.active { color: white; border-color: transparent; }
        .filter-btn.active[data-type="All"] { background-color: #555; }
        .filter-btn.active[data-type="In Person"] { background-color: #28a745; }
        .filter-btn.active[data-type="Call"] { background-color: #fd7e14; }
        .filter-btn.active[data-type="Message"] { background-color: #17a2b8; }

        /* Search Bar */
        .search-bar {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #2c2c2c;
            color: white;
            box-sizing: border-box;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed; 
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
            vertical-align: middle;
            word-wrap: break-word;
        }
        
        th { color: #fff; font-weight: bold; }
        td { color: #ddd; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background-color: #2c2c2c; }
        .sort-icon { font-size: 0.8rem; margin-left: 5px; color: #888; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            margin-right: 6px;
            text-transform: uppercase;
            vertical-align: middle;
        }
        .tag-person { background-color: #28a745; } 
        .tag-call { background-color: #fd7e14; }   
        .tag-message { background-color: #17a2b8; } 
        .tag-unknown { background-color: #6c757d; } 

        .note-cell { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; font-size: 0.9rem; }
        tr:hover { background-color: #2c2c2c; }

        /* Actions */
        .btn {
            padding: 6px 10px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 2px;
            margin-bottom: 2px;
            display: inline-block;
        }
        .update-btn { background-color: #007bff; }
        .history-btn { background-color: #6c757d; }
        .delete-btn { background-color: #dc3545; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            width: 90%; 
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 80vh; 
            color: #fff;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.9rem; color: #ccc; font-weight: bold; }
        input[type="date"], select, input[type="password"] {
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            font-family: sans-serif;
            width: 100%;
            box-sizing: border-box;
            background: #444;
            color: white;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 5px;
            resize: none;
            border: 1px solid #555;
            border-radius: 4px;
            box-sizing: border-box;
            background: #444;
            color: white;
        }
        
        #historyList { overflow-y: auto; max-height: 300px; border-top: 1px solid #444; margin-top: 10px; }
        .history-item { 
            background: #383838; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            border-left: 4px solid #007bff; 
            position: relative; 
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding-right: 25px; }
        .history-date { font-weight: bold; font-size: 0.85rem; color: #ccc; }
        .history-note { margin: 0; font-size: 0.95rem; color: #eee; }
        
        .delete-history-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 5px;
        }
        .close-btn { background-color: #555; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 5px; }

        /* Backup Section */
        .backup-section { border-top: 2px solid #333; padding-top: 20px; text-align: center; }
        .backup-btn {
            padding: 8px 16px;
            background-color: #17a2b8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            th:nth-child(3), td:nth-child(3) { display: none; }
            th:nth-child(1) { width: 35%; }
            th:nth-child(2) { width: 30%; }
            th:nth-child(4) { width: 35%; }
            th, td { font-size: 0.9rem; padding: 8px 4px; }
            .btn { width: 100%; margin-bottom: 4px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="openSettingsModal()">⚙️</button>
    <h1>Friend Tracker</h1>
    
    <div class="cloud-controls">
        <button class="sync-btn" onclick="saveToCloud()">⬆️ Upload</button>
        <button class="sync-btn" onclick="loadFromCloud()">⬇️ Download</button>
        <span id="syncStatus">Ready to sync</span>
    </div>

    <p style="text-align:center; color:#888; font-size:0.9rem; margin-bottom:20px;">
        Click column headers to sort.
    </p>
    
    <div class="input-group">
        <input type="text" id="newFriendName" placeholder="Enter friend's name to add...">
        <button class="add-btn" onclick="addFriend()">Add Friend</button>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" data-type="All" onclick="setFilter('All')">All</button>
        <button class="filter-btn" data-type="In Person" onclick="setFilter('In Person')">In Person</button>
        <button class="filter-btn" data-type="Call" onclick="setFilter('Call')">Call</button>
        <button class="filter-btn" data-type="Message" onclick="setFilter('Message')">Message</button>
    </div>

    <input type="text" id="searchBar" class="search-bar" placeholder="🔍 Search for a name..." oninput="renderFriends()">

    <table>
        <thead>
            <tr>
                <th style="width: 20%;" class="sortable" onclick="handleSort('name')">
                    Name <span id="sort-icon-name" class="sort-icon"></span>
                </th>
                <th style="width: 25%;" class="sortable" onclick="handleSort('lastContact')">
                    Last Contact <span id="sort-icon-lastContact" class="sort-icon">▼</span>
                </th>
                <th style="width: 25%;">Latest Note</th>
                <th style="width: 30%;">Actions</th>
            </tr>
        </thead>
        <tbody id="friendList"></tbody>
    </table>

    <div class="backup-section">
        <h3>Data Backup</h3>
        <button class="backup-btn" onclick="downloadData()">💾 Save to File</button>
        <button class="backup-btn" onclick="triggerFileUpload()">📂 Load from File</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadData(this)">
    </div>
</div>

<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3 id="modalFriendName">Update Contact</h3>
        <div class="form-group">
            <label>Type:</label>
            <select id="interactionType">
                <option value="In Person">In Person</option>
                <option value="Call">Call</option>
                <option value="Message">Message</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date:</label>
            <input type="date" id="interactionDate">
        </div>
        <p style="margin-bottom:5px; font-weight:bold; color:#ccc; font-size:0.9rem;">Note:</p>
        <textarea id="interactionNote" placeholder="e.g. Had lunch..."></textarea>
        <button class="add-btn" onclick="saveInteraction()">Save & Update</button>
        <button class="close-btn" onclick="closeModal('noteModal')">Cancel</button>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h3>History for <span id="historyFriendName"></span></h3>
        <div id="historyList"></div>
        <button class="close-btn" onclick="closeModal('historyModal')">Close</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>☁️ Cloud Sync Setup</h3>
        <p style="font-size:0.9rem; color:#aaa;">To sync across devices, create a free bin at <strong>jsonbin.io</strong> and paste keys here.</p>
        
        <div class="form-group">
            <label>Bin ID:</label>
            <input type="text" id="settingBinId" placeholder="e.g. 65a123...">
        </div>
        <div class="form-group">
            <label>API Key (X-Master-Key):</label>
            <input type="password" id="settingApiKey" placeholder="e.g. $2a$10$...">
        </div>
        
        <button class="add-btn" onclick="saveSettings()">Save Keys</button>
        <button class="close-btn" onclick="closeModal('settingsModal')">Cancel</button>
    </div>
</div>

<script>
    // --- APP STATE ---
    let friends = JSON.parse(localStorage.getItem('myFriendTracker')) || [];
    let currentFriendId = null;
    let currentSortCol = 'lastContact'; 
    let isSortAsc = false; 
    let currentFilter = 'All';

    // Cloud Keys
    let cloudConfig = JSON.parse(localStorage.getItem('myFriendTrackerConfig')) || { binId: '', apiKey: '' };

    // --- CLOUD SYNC LOGIC ---

    async function loadFromCloud() {
        if (!cloudConfig.binId || !cloudConfig.apiKey) {
            alert("Please enter API keys in Settings first.");
            return;
        }

        updateSyncStatus("⏳ Downloading...");
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}/latest`, {
                headers: { 'X-Master-Key': cloudConfig.apiKey }
            });

            if (response.ok) {
                const data = await response.json();
                friends = data.record; 
                localStorage.setItem('myFriendTracker', JSON.stringify(friends)); 
                normalizeData(); 
                renderFriends();
                updateSyncStatus("✅ Download Complete");
            } else {
                updateSyncStatus("❌ Error fetching data");
            }
        } catch (error) {
            console.error(error);
            updateSyncStatus("❌ Connection Failed");
        }
    }

    async function saveToCloud() {
        // Just save local storage first to be safe
        localStorage.setItem('myFriendTracker', JSON.stringify(friends));

        if (!cloudConfig.binId || !cloudConfig.apiKey) {
            alert("Please enter API keys in Settings first.");
            return;
        }

        updateSyncStatus("⏳ Uploading...");
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': cloudConfig.apiKey
                },
                body: JSON.stringify(friends)
            });

            if (response.ok) {
                updateSyncStatus("✅ Upload Complete");
            } else {
                updateSyncStatus("❌ Upload Failed");
            }
        } catch (error) {
            console.error(error);
            updateSyncStatus("❌ Connection Failed");
        }
    }

    function updateSyncStatus(msg) {
        document.getElementById('syncStatus').innerText = msg;
    }

    // --- NORMALIZATION & HELPERS ---

    function normalizeData() {
        let changed = false;
        friends.forEach(friend => {
            if (friend.notes) {
                friend.notes.forEach(note => {
                    if (note.date && note.date.includes('/')) {
                        const parts = note.date.split('/');
                        if (parts.length === 3) {
                            note.date = `${parts[2]}-${parts[1]}-${parts[0]}`;
                            changed = true;
                        }
                    }
                });
                friend.notes = sortNotesDescending(friend.notes);
                if (friend.notes.length > 0) friend.lastContact = friend.notes[0].date;
                else friend.lastContact = 'Never';
            }
        });
        if(changed) saveData(); // Save locally if cleaned
    }

    function formatDisplayDate(dateStr) {
        if (!dateStr || dateStr === 'Never') return 'Never';
        const parts = dateStr.split('-');
        if (parts.length === 3) return new Date(dateStr + 'T12:00:00').toLocaleDateString();
        return dateStr;
    }

    function getTagHTML(type) {
        let cssClass = 'tag-unknown';
        if (type === 'In Person') cssClass = 'tag-person';
        if (type === 'Call') cssClass = 'tag-call';
        if (type === 'Message') cssClass = 'tag-message';
        if (!type) return '';
        return `<span class="tag ${cssClass}">${type}</span>`;
    }

    function sortNotesDescending(notes) {
        return notes.sort((a,b) => {
            const dA = a.date || '0000-00-00';
            const dB = b.date || '0000-00-00';
            if (dA > dB) return -1;
            if (dA < dB) return 1;
            return 0;
        });
    }

    function getFilteredData(friend) {
        if (!friend.notes || friend.notes.length === 0) return { date: 'Never', noteObj: null };
        let relevantNotes = friend.notes;
        if (currentFilter !== 'All') relevantNotes = friend.notes.filter(n => n.type === currentFilter);
        relevantNotes = sortNotesDescending(relevantNotes);
        return relevantNotes.length > 0 ? { date: relevantNotes[0].date, noteObj: relevantNotes[0] } : { date: 'Never', noteObj: null };
    }

    // --- UI INTERACTION ---

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.dataset.type === type) btn.classList.add('active');
        });
        renderFriends();
    }

    function handleSort(colName) {
        if (currentSortCol === colName) isSortAsc = !isSortAsc;
        else { currentSortCol = colName; isSortAsc = (colName === 'name'); }
        renderFriends();
    }

    function sortFriends() {
        friends.sort((a, b) => {
            let aData = getFilteredData(a);
            let bData = getFilteredData(b);
            let valA = (currentSortCol === 'name') ? a.name : aData.date;
            let valB = (currentSortCol === 'name') ? b.name : bData.date;
            
            let comparison = 0;
            if (currentSortCol === 'lastContact') {
                if (valA === 'Never') valA = '0000-00-00';
                if (valB === 'Never') valB = '0000-00-00';
                if (valA < valB) comparison = -1;
                if (valA > valB) comparison = 1;
            } else {
                comparison = valA.toLowerCase().localeCompare(valB.toLowerCase());
            }
            return isSortAsc ? comparison : comparison * -1;
        });
    }

    function updateSortIcons() {
        document.getElementById('sort-icon-name').innerText = '';
        document.getElementById('sort-icon-lastContact').innerText = '';
        document.getElementById(`sort-icon-${currentSortCol}`).innerText = isSortAsc ? '▲' : '▼';
    }

    function renderFriends() {
        sortFriends(); 
        updateSortIcons(); 
        const listElement = document.getElementById('friendList');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        listElement.innerHTML = ''; 

        friends.forEach((friend, index) => {
            if (!friend.name.toLowerCase().includes(searchTerm)) return;
            const filteredData = getFilteredData(friend);
            const row = document.createElement('tr');
            const dateColor = filteredData.date === 'Never' ? 'color: #ff6b6b;' : '';
            const displayDate = formatDisplayDate(filteredData.date);
            let noteHTML = "-";
            if (filteredData.noteObj) noteHTML = `${getTagHTML(filteredData.noteObj.type)}${filteredData.noteObj.note}`;

            row.innerHTML = `
                <td><strong>${friend.name}</strong></td>
                <td style="${dateColor}">${displayDate}</td>
                <td class="note-cell" title="Hover to see full note">${noteHTML}</td>
                <td>
                    <button class="btn update-btn" onclick="openNoteModal(${index})">Update</button>
                    <button class="btn history-btn" onclick="openHistoryModal(${index})">History</button>
                    <button class="btn delete-btn" onclick="deleteFriend(${index})">Delete</button>
                </td>
            `;
            listElement.appendChild(row);
        });
    }

    // --- ACTIONS ---

    function saveData() {
        localStorage.setItem('myFriendTracker', JSON.stringify(friends));
    }

    function addFriend() {
        const name = document.getElementById('newFriendName').value.trim();
        if (name) {
            friends.push({ name: name, lastContact: 'Never', notes: [] });
            document.getElementById('newFriendName').value = ''; 
            saveData(); // Only save to local storage
            renderFriends();
        }
    }

    function deleteFriend(index) {
        if (confirm(`Delete ${friends[index].name}?`)) {
            friends.splice(index, 1);
            saveData(); // Only save to local storage
            renderFriends();
        }
    }

    // --- MODALS ---

    function openNoteModal(index) {
        currentFriendId = index;
        document.getElementById('modalFriendName').innerText = `Update: ${friends[index].name}`;
        document.getElementById('interactionNote').value = ''; 
        document.getElementById('interactionType').value = 'In Person'; 
        const now = new Date();
        document.getElementById('interactionDate').value = now.toISOString().split('T')[0];
        document.getElementById('noteModal').style.display = 'flex';
    }

    function saveInteraction() {
        const noteText = document.getElementById('interactionNote').value;
        const dateInput = document.getElementById('interactionDate').value || new Date().toISOString().split('T')[0];
        const typeInput = document.getElementById('interactionType').value;
        
        if (currentFriendId !== null) {
            friends[currentFriendId].notes.push({ date: dateInput, note: noteText || "No details added.", type: typeInput });
            saveData(); // Only save to local storage
            renderFriends(); 
            closeModal('noteModal');
        }
    }

    function openHistoryModal(index) {
        currentFriendId = index;
        const friend = friends[index];
        document.getElementById('historyFriendName').innerText = friend.name;
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = ''; 
        const sortedNotes = sortNotesDescending([...friend.notes]);

        if (sortedNotes.length === 0) historyList.innerHTML = '<p style="text-align:center; color:#777;">No history yet.</p>';
        else {
            sortedNotes.forEach(note => {
                const originalIndex = friend.notes.indexOf(note);
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-header">
                        <span class="history-date">${formatDisplayDate(note.date)}</span>
                        ${getTagHTML(note.type)}
                        <button class="delete-history-btn" onclick="deleteHistoryItem(${index}, ${originalIndex})">×</button>
                    </div>
                    <p class="history-note">${note.note}</p>
                `;
                historyList.appendChild(item);
            });
        }
        document.getElementById('historyModal').style.display = 'flex';
    }

    function deleteHistoryItem(friendIndex, noteIndex) {
        if(confirm("Delete this note?")) {
            friends[friendIndex].notes.splice(noteIndex, 1);
            saveData(); // Only save to local storage
            renderFriends();
            openHistoryModal(friendIndex);
        }
    }

    // --- SETTINGS MODAL ---

    function openSettingsModal() {
        document.getElementById('settingBinId').value = cloudConfig.binId;
        document.getElementById('settingApiKey').value = cloudConfig.apiKey;
        document.getElementById('settingsModal').style.display = 'flex';
    }

    function saveSettings() {
        const binId = document.getElementById('settingBinId').value.trim();
        const apiKey = document.getElementById('settingApiKey').value.trim();
        
        cloudConfig = { binId, apiKey };
        localStorage.setItem('myFriendTrackerConfig', JSON.stringify(cloudConfig));
        
        closeModal('settingsModal');
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if(id !== 'historyModal') currentFriendId = null;
    }

    function downloadData() {
        const dataStr = JSON.stringify(friends, null, 2); 
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "friends_data.json"; 
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function triggerFileUpload() {
        document.getElementById('fileInput').click();
    }

    function loadData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const loadedFriends = JSON.parse(e.target.result);
                if (Array.isArray(loadedFriends)) {
                    friends = loadedFriends;
                    normalizeData(); 
                    saveData(); 
                    renderFriends(); 
                    alert("Data loaded successfully!");
                } else {
                    alert("Error: File format is incorrect.");
                }
            } catch (err) {
                alert("Error reading file: " + err);
            }
        };
        reader.readAsText(file);
        input.value = '';
    }

    // Initial Start
    normalizeData();
    renderFriends();
    // Note: loadFromCloud() is NO LONGER called on startup.
</script>
